[package]
name = "nockchain-mining-common"
version.workspace = true
edition.workspace = true
description = "Shared substrate for nockchain miner binaries: MiningWire ABI, mining-key configs, MiningCandidate decode, and a NodeClient that drives the node's private gRPC (Peek/Poke + WatchEffects)."
publish = false

[lib]
name = "nockchain_mining_common"
path = "src/lib.rs"

[dependencies]
nockapp = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
