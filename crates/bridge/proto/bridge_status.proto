syntax = "proto3";

package bridge.status.v1;

enum RunningState {
  RUNNING_STATE_UNSPECIFIED = 0;
  RUNNING = 1;
  STOPPED = 2;
}

message GetStatusRequest {}

message Base58Hash {
  string value = 1;
}

message EthAddress {
  string value = 1;
}

message LastDeposit {
  Base58Hash tx_id = 1;
  Base58Hash name_first = 2;
  Base58Hash name_last = 3;
  EthAddress recipient = 4;
  uint64 amount = 5;
  uint64 block_height = 6;
  Base58Hash as_of = 7;
  uint64 nonce = 8;
  string base_tx_hash = 9;
  uint64 base_block_number = 10;
}

message SuccessfulDeposit {
  Base58Hash tx_id = 1;
  Base58Hash name_first = 2;
  Base58Hash name_last = 3;
  EthAddress recipient = 4;
  uint64 amount = 5;
  uint64 block_height = 6;
  Base58Hash as_of = 7;
  uint64 nonce = 8;
}

message GetStatusResponse {
  RunningState running_state = 1;
  bool nock_hold = 2;
  bool base_hold = 3;
  optional uint64 nock_hold_height = 4;
  optional uint64 base_hold_height = 5;
  optional uint64 nock_height = 6;
  optional uint64 base_height = 7;
  optional LastDeposit last_submitted_deposit = 8;
  optional SuccessfulDeposit last_successful_deposit = 9;
  uint64 pending_deposits = 10;
  uint64 pending_withdrawals = 11;
  uint64 unsettled_deposit_count = 12;
  uint64 unsettled_withdrawal_count = 13;
  optional string degradation_warning = 14;
  bool nockchain_api_connected = 15;
  optional string nockchain_api_last_error = 16;
  uint32 peer_unhealthy_count = 17;
  optional string last_stop_reason = 18;
  optional string last_error_summary = 19;
}

service BridgeStatus {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}
