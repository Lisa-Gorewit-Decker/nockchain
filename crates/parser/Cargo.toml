[package]
name = "parser"
version = "0.1.0"
edition.workspace = true

[features]
default = []

[dependencies]
nockvm = { workspace = true }
nockvm_macros = { workspace = true }
logos = "0.15"
chumsky = { version = "0.10", features = ["memoization"] }
ariadne = "0.5.1"

[[bin]]
name = "parser"
path = "src/main.rs"

[lib]
path = "src/lib.rs"