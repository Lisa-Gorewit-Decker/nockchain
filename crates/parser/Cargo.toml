[package]
name = "parser"
version = "0.1.0"
edition.workspace = true

[features]
default = []

[dependencies]
nockvm = { workspace = true }
nockvm_macros = { workspace = true }
chumsky = { version = "0.10", features = ["regex"] }
ariadne = "0.5.1"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[[bin]]
name = "parser"
path = "src/main.rs"

[lib]
path = "src/lib.rs"