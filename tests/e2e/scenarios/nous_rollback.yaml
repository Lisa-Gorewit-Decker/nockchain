# Nous rollout scenario: node restart and rejoin after gen2 session
#
# Verifies that a gen2-enabled node can be stopped and restarted while its
# peer continues mining, then successfully re-syncs the missed blocks.
# This exercises the restart/reconnect path that operators use during
# rolling upgrades and the rollback procedure.
#
# NOTE: The current scenario schema does not support changing env vars
# between stop/start cycles.  The protocol-ordering rollback (disabling
# send_enabled) is verified at the crate level by the integration test
# req_res_gen2_rollback_reverts_outbound_to_gen1.  This scenario verifies
# the node-level restart/rejoin behavior.
#
# Generation matrix cell: new(enabled) restart + rejoin
# Expected behavior: head convergence after restart and catch-up.

name: "nous_rollback"
seed: 24

nodes:
  - id: "node-stable"
    binary: "${NOCKCHAIN_BIN_NEW}"
    fakenet: true
    new_state: true
    mine: true
    mining_pkh: "9yPePjfWAdUnzaQKyxcRXKRa5PpUzKKEwtpECBZsUYt9Jd7egSDEWoV"
    fakenet_pow_len: 2
    fakenet_log_difficulty: 1
    fakenet_v1_phase: 3
    no_default_peers: true
    env:
      NOCKCHAIN_LIBP2P_REQ_RES_GEN2_ACCEPT_ENABLED: "true"
      NOCKCHAIN_LIBP2P_REQ_RES_GEN2_SEND_ENABLED: "true"
      NOCKCHAIN_LIBP2P_FORCE_PEER_DIAL_INTERVAL_SECS: "5"
      NOCKCHAIN_LIBP2P_IP_BUCKET_REQUEST_ADMISSION_LIMIT: "0"

  - id: "node-restart"
    binary: "${NOCKCHAIN_BIN_NEW}"
    fakenet: true
    new_state: true
    fakenet_pow_len: 2
    fakenet_log_difficulty: 1
    fakenet_v1_phase: 3
    no_default_peers: true
    peer_from:
      - node: "node-stable"
        listen: "/ip4/127.0.0.1/udp/${BASE_P2P_PORT}/quic-v1"
    env:
      NOCKCHAIN_LIBP2P_REQ_RES_GEN2_ACCEPT_ENABLED: "true"
      NOCKCHAIN_LIBP2P_REQ_RES_GEN2_SEND_ENABLED: "true"
      NOCKCHAIN_LIBP2P_FORCE_PEER_DIAL_INTERVAL_SECS: "5"
      NOCKCHAIN_LIBP2P_IP_BUCKET_REQUEST_ADMISSION_LIMIT: "0"

steps:
  # Phase 1: both gen2-enabled, sync normally
  - action: start_nodes
    ids: ["node-stable", "node-restart"]

  - action: wait_for_grpc
    node: "node-stable"
    timeout_ms: 300000

  - action: wait_for_grpc
    node: "node-restart"
    timeout_ms: 300000

  - action: wait_for_height
    node: "node-stable"
    height: 5
    timeout_ms: 120000

  - action: wait_for_height
    node: "node-restart"
    height: 5
    timeout_ms: 120000

  # Phase 2: stop node-restart while node-stable continues mining
  - action: stop_nodes
    ids: ["node-restart"]

  - action: wait_for_height
    node: "node-stable"
    height: 8
    timeout_ms: 120000

  - action: sleep
    millis: 2000

  # Phase 3: restart and re-sync missed blocks
  - action: start_nodes
    ids: ["node-restart"]

  - action: wait_for_grpc
    node: "node-restart"
    timeout_ms: 300000

  - action: wait_for_height
    node: "node-stable"
    height: 12
    timeout_ms: 120000

  - action: wait_for_height
    node: "node-restart"
    height: 12
    timeout_ms: 120000

asserts:
  - assert: req_res_generation
    node: "node-restart"
    peer: "node-stable"
    generation: gen2
    timeout_ms: 30000
  - assert: heads_equal
    nodes: ["node-stable", "node-restart"]
    timeout_ms: 60000
